services:
  # ── Infrastructure (always runs) ──────────────────
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  seq:
    image: datalust/seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data
    networks:
      - ecommerce-network

  # ── Application services (profile: app) ──────────
  product:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__ProductDb=Host=postgres;Database=product_db;Username=ecommerce;Password=ecommerce
      - RabbitMq__Host=rabbitmq
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__OrderDb=Host=postgres;Database=order_db;Username=ecommerce;Password=ecommerce
      - RabbitMq__Host=rabbitmq
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  stock:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__StockDb=Host=postgres;Database=stock_db;Username=ecommerce;Password=ecommerce
      - RabbitMq__Host=rabbitmq
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5004:8080"
    environment:
      - ConnectionStrings__UserDb=Host=postgres;Database=user_db;Username=ecommerce;Password=ecommerce
      - RabbitMq__Host=rabbitmq
      - JwtSettings__Secret=super-secret-key-that-should-be-at-least-32-characters-long!
      - JwtSettings__Issuer=ecommerce
      - JwtSettings__Audience=ecommerce
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Dev tools (profile: tools) ───────────────────
  pgadmin:
    image: dpage/pgadmin4
    profiles: ["tools"]
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  seq_data:

networks:
  ecommerce-network:
