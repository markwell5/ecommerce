global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "product-service"
    static_configs:
      - targets: ["product:8080"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order:8080"]

  - job_name: "stock-service"
    static_configs:
      - targets: ["stock:8080"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user:8080"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment:8080"]

  - job_name: "cart-service"
    static_configs:
      - targets: ["cart:8080"]
