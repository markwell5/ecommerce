x-app-healthcheck: &app-healthcheck
  test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # ── Infrastructure (always runs) ──────────────────
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    ports:
      - "6432:6432"
    volumes:
      - ./scripts/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./scripts/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ecommerce -d product_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  seq:
    image: datalust/seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data
    networks:
      - ecommerce-network

  jaeger:
    image: jaegertracing/all-in-one:1.62
    profiles: ["tools"]
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ecommerce-network

  # ── Application services (profile: app) ──────────
  product:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5001:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__ProductDb=Host=pgbouncer;Port=6432;Database=product_db;Username=ecommerce;Password=ecommerce
      - ConnectionStrings__Redis=redis:6379
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5002:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__OrderDb=Host=pgbouncer;Port=6432;Database=order_db;Username=ecommerce;Password=ecommerce
      - ConnectionStrings__Redis=redis:6379
      - GrpcClients__ProductService=http://product:8080
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      product:
        condition: service_healthy
      stock:
        condition: service_healthy

  stock:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5003:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__StockDb=Host=pgbouncer;Port=6432;Database=stock_db;Username=ecommerce;Password=ecommerce
      - ConnectionStrings__Redis=redis:6379
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  user:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5004:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__UserDb=Host=pgbouncer;Port=6432;Database=user_db;Username=ecommerce;Password=ecommerce
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5005:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__PaymentDb=Host=pgbouncer;Port=6432;Database=payment_db;Username=ecommerce;Password=ecommerce
      - ConnectionStrings__Redis=redis:6379
      - StripeSettings__SecretKey=${STRIPE_SECRET_KEY:-}
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  cart:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    profiles: ["app"]
    ports:
      - "5006:8080"
    env_file: .env.docker
    environment:
      - ConnectionStrings__Redis=redis:6379
      - GrpcClients__ProductService=http://product:8080
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    healthcheck: *app-healthcheck
    networks:
      - ecommerce-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product:
        condition: service_healthy

  # ── Dev tools (profile: tools) ───────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["tools"]
    ports:
      - "9090:9090"
    volumes:
      - ./tools/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["tools"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./tools/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./tools/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["tools"]
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  seq_data:
  prometheus_data:
  grafana_data:

networks:
  ecommerce-network:
