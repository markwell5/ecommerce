syntax = "proto3";

option csharp_namespace = "Ecommerce.Shared.Protos";

package ecommerce.wishlist;

service WishlistGrpc {
  rpc GetWishlistsByCustomer (GetWishlistsByCustomerRequest) returns (WishlistListReply);
  rpc GetWishlistByShareToken (GetWishlistByShareTokenRequest) returns (WishlistReply);
  rpc GetWishlist (GetWishlistRequest) returns (WishlistReply);
  rpc CreateWishlist (CreateWishlistGrpcRequest) returns (WishlistReply);
  rpc RenameWishlist (RenameWishlistGrpcRequest) returns (WishlistReply);
  rpc DeleteWishlist (DeleteWishlistGrpcRequest) returns (WishlistDeleteReply);
  rpc AddWishlistItem (AddWishlistItemGrpcRequest) returns (WishlistReply);
  rpc RemoveWishlistItem (RemoveWishlistItemGrpcRequest) returns (WishlistReply);
  rpc ToggleWishlistVisibility (ToggleWishlistVisibilityGrpcRequest) returns (WishlistReply);
  rpc SetRestockNotification (SetRestockNotificationGrpcRequest) returns (WishlistReply);
}

message GetWishlistsByCustomerRequest {
  string customer_id = 1;
}

message GetWishlistByShareTokenRequest {
  string share_token = 1;
}

message GetWishlistRequest {
  int64 id = 1;
}

message CreateWishlistGrpcRequest {
  string customer_id = 1;
  string name = 2;
}

message RenameWishlistGrpcRequest {
  int64 id = 1;
  string name = 2;
}

message DeleteWishlistGrpcRequest {
  int64 id = 1;
}

message AddWishlistItemGrpcRequest {
  int64 wishlist_id = 1;
  int64 product_id = 2;
  string customer_id = 3;
}

message RemoveWishlistItemGrpcRequest {
  int64 wishlist_id = 1;
  int64 product_id = 2;
}

message ToggleWishlistVisibilityGrpcRequest {
  int64 id = 1;
  bool is_public = 2;
}

message SetRestockNotificationGrpcRequest {
  int64 wishlist_id = 1;
  int64 product_id = 2;
  bool notify = 3;
}

message WishlistReply {
  int64 id = 1;
  string customer_id = 2;
  string name = 3;
  bool is_default = 4;
  string share_token = 5;
  bool is_public = 6;
  repeated WishlistItemReply items = 7;
  string created_at = 8;
  string updated_at = 9;
}

message WishlistItemReply {
  int64 id = 1;
  int64 wishlist_id = 2;
  int64 product_id = 3;
  bool notify_on_restock = 4;
  string added_at = 5;
}

message WishlistListReply {
  repeated WishlistReply wishlists = 1;
}

message WishlistDeleteReply {
  bool success = 1;
}
